{% extends "auth_base.html" %}

{% block title %}Register - Student Task Manager{% endblock %}

{% block content %}
<section class="auth-layout single-column">
  <div class="auth-card card-surface">
    <h2>Create your account</h2>
    <p class="auth-copy">Start managing assignments, exams, and project deadlines.</p>
    <form id="register-form" novalidate>
      <label for="register-username">Username</label>
      <input type="text" id="register-username" minlength="3" required />

      <label for="register-email">Email</label>
      <input type="email" id="register-email" required />

      <label for="register-password">Password</label>
      <input type="password" id="register-password" minlength="6" required />

      <label for="register-confirm-password">Confirm Password</label>
      <input type="password" id="register-confirm-password" minlength="6" required />

      <button type="submit" class="primary-btn">Sign up</button>
    </form>
    <p class="auth-switch">
      Already registered?
      <a href="{{ url_for('views.login_page') }}">Back to login</a>
    </p>
    <p id="auth-message" class="message"></p>
  </div>
</section>
{% endblock %}
