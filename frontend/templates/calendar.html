{% extends "base.html" %}

{% block title %}Calendar - Student Task Manager{% endblock %}

{% block content %}
<section class="card-surface" id="calendar-page-root">
  <div class="section-head">
    <h1>Monthly Calendar</h1>
    <div class="calendar-nav">
      <button id="calendar-today" class="ghost-btn" type="button">Today</button>
      <button id="calendar-prev" class="ghost-btn" type="button">Previous</button>
      <strong id="calendar-month"></strong>
      <button id="calendar-next" class="ghost-btn" type="button">Next</button>
    </div>
  </div>

  <p class="subtle-text">Select a date to view tasks due on that specific day.</p>
  <div id="calendar-grid" class="calendar-grid"></div>

  <section class="card-surface nested-card">
    <h2 id="calendar-task-list-title">Tasks on Selected Date</h2>
    <div id="calendar-task-list" class="task-list"></div>
  </section>

  <p id="calendar-message" class="message"></p>
</section>
{% endblock %}
