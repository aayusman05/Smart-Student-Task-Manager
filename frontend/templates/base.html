<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Student Task Manager{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    {% if current_user.is_authenticated %}
    <div class="app-shell">
      <aside class="sidebar card-surface">
        <div class="sidebar-header">
          <a class="brand" href="{{ url_for('views.dashboard') }}">Student Task Manager</a>
          <p class="subtle-text">Welcome, {{ current_user.username }}</p>
        </div>

        <nav class="sidebar-nav">
          <a href="{{ url_for('views.dashboard') }}">Dashboard</a>
          <a href="{{ url_for('views.task_form') }}">Add Task</a>
          <a href="{{ url_for('views.subjects_page') }}">Subjects</a>
          <a href="{{ url_for('views.calendar_page') }}">Calendar</a>
          <a href="{{ url_for('views.weekly_summary') }}">Summary</a>
        </nav>

        <div class="sidebar-footer">
          <button class="logout-link logout-button" type="button">Logout</button>
        </div>
      </aside>
    {% else %}
    <header class="topbar">
      <a class="brand" href="{{ url_for('views.index') }}">Student Task Manager</a>
      <nav class="topnav">
        <a href="{{ url_for('views.login_page') }}">Login</a>
        <a href="{{ url_for('views.register_page') }}">Signup</a>
      </nav>
    </header>
    {% endif %}

    <main class="page-wrap{% if current_user.is_authenticated %} page-with-sidebar{% endif %}">
      {% block content %}{% endblock %}
    </main>

    {% if current_user.is_authenticated %}
    </div>
    {% endif %}
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
